<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Procesador de Imágenes</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        .container { max-width: 800px; margin: auto; }
        .images-grid { display: flex; gap: 20px; margin-top: 30px; justify-content: center; }
        .image-box { text-align: center; border: 1px solid #ddd; padding: 15px; border-radius: 8px; background-color: #f9f9f9;}
        /* La imagen original la mostramos con borde invisible o gris claro en CSS para contrastar que la otra trae borde real de Python */
        img { max-width: 300px; height: auto; box-shadow: 2px 2px 10px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<div class="container">
    <h1>Agregar Borde a Imágenes</h1>
    <p>Selecciona una imagen (.jpg o .bmp) para procesar.</p>

    <form action="/" method="POST" enctype="multipart/form-data">
        <input type="file" name="file" accept=".jpg,.jpeg,.bmp" required>
        <button type="submit">Subir y Procesar</button>
    </form>

    <hr style="margin-top: 30px;">

    {% if original_img and bordered_img %}
        <h2>Resultados:</h2>
        <div class="images-grid">
            <div class="image-box">
                <h3>Sin bordes (Original)</h3>
                <img src="{{ url_for('upload', filename=original_img) }}" alt="Original">
            </div>
            <div class="image-box">
                <h3>Con bordes (Procesada)</h3>
                <img src="{{ url_for('upload', filename=bordered_img) }}" alt="Con Borde">
            </div>
        </div>
    {% endif %}
</div>

</body>
</html>
