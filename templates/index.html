<!DOCTYPE html>
<html>
<head>
    <title>File Upload</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/dropzone/5.7.1/min/dropzone.min.css">
    <style>
        .gallery {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 30px;
        }
        /* Estilos para mantener proporciones uniformes en ambas galerías */
        .gallery img {
            width: 150px;
            height: 150px;
            object-fit: cover;
            border: 1px solid #ccc;
        }
        /* La imagen con borde no necesita borde CSS adicional */
        .gallery img.con-borde {
            border: none;
        }
    </style>
</head>

<body>

<h1>File Upload con Dropzone</h1>

<form action="{{ url_for('upload_files') }}" class="dropzone" id="my-dropzone"></form>

<hr>

<h2>Imágenes subidas:</h2>
<div class="gallery">
    {% for file in original_files %}
        <img src="{{ url_for('upload', filename=file) }}" alt="Original">
    {% endfor %}
</div>

<h2>Imágenes con bordes:</h2>
<div class="gallery">
    {% for file in bordered_files %}
        <img class="con-borde" src="{{ url_for('upload', filename=file) }}" alt="Con Borde">
    {% endfor %}
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/dropzone/5.7.1/min/dropzone.min.js"></script>
<script>
    Dropzone.options.myDropzone = {
        maxFilesize: 1, // Restringe a 1MB en el lado del cliente también
        acceptedFiles: ".jpeg,.jpg,.png,.bmp",
        init: function() {
            this.on("queuecomplete", function() {
                // Cuando termina de procesar los archivos, espera 2.5 segundos
                // para que el usuario pueda ver las "X" de error antes de recargar.
                setTimeout(function() {
                    location.reload();
                }, 2500);
            });
        }
    };
</script>

</body>
</html>
